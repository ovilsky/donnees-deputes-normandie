name: Actualisation des donnees des deputes

on:
  schedule:
    # Lancement tous les jours à 8h00 du matin (heure UTC, soit 10h00 en France l'été)
    - cron: '0 8 * * *'
  workflow_dispatch: # Ce paramètre vous permet d'ajouter un bouton pour le lancer manuellement !

jobs:
  recuperer-les-donnees:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Récupérer le dossier
        uses: actions/checkout@v4

      - name: 2. Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Installer les dépendances (requests)
        run: pip install -r requirements.txt

      - name: 4. Lancer le script d'extraction
        run: python scraper.py

      - name: 5. Sauvegarder le CSV généré sur le dépôt
        run: |
          git config --global user.name 'Robot GitHub'
          git config --global user.email 'action@github.com'
          git add deputes_normands.csv
          # On enregistre uniquement si le fichier CSV a été modifié aujourd'hui
          git diff --quiet && git diff --staged --quiet || git commit -m "Mise à jour quotidienne des données"
          git push
